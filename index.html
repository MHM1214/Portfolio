 <!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毛海民作品集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .image-list {
      /* 防止任何行内空白符造成的间隙 */
      font-size: 0;
    }

    .image-list img {
      display: block;          /* 块级元素，独占一行 */
      width: 800px;            /* 固定宽度 */
      margin: 0 auto;          /* 水平居中 */
      padding: 0;
      border: none;
      line-height: 0;          /* 彻底消除行高影响 */
      vertical-align: top;     /* 虽然 block 下无影响，但保留以防修改 */
    }
  </style>
</head>
<body>

  <div class="image-list">
    <img src="ztf/1.jpg" alt="">
    <img src="ztf/2.jpg" alt="">
    <img src="ztf/3.jpg" alt="">
    <img src="ztf/4.jpg" alt="">
    <img src="ztf/5.jpg" alt="">

    <img src="ztf/7.jpg" alt="">

    <img src="ztf/14.jpg" alt="">
    <img src="ztf/15.jpg" alt="">
    <img src="zpj/滑雪1.jpg" alt="">
    <img src="zpj/CDS.jpg" alt="">
    <img src="zpj/showreel1.jpg" alt="">
    <img src="zpj/showreel2.mp4" alt="">
    <img src="zpj/showreel3.jpg" alt="">
    <img src="zpj/fcrs.jpg" alt="">
  </div>

</body>
</html>
